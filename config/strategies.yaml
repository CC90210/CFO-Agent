# ─────────────────────────────────────────────────────────────────────────────
#  ATLAS TRADING AGENT — Strategy Configuration
#  All strategies are loaded at runtime by core/engine.py.
#  Set enabled: false to exclude a strategy from the run.
#
#  TUNING NOTE (2026-03-19): Scale-out tiers DISABLED in backtest engine.
#  Empirical finding: default scale-out (30% at 1R, 30% at 2R) causes -5% to
#  -20% return drag vs no scale-out. Multi-TF went from -16.67% to +21.16%
#  on BNB by removing scale-out alone.
# ─────────────────────────────────────────────────────────────────────────────

strategies:

  # ── 1. RSI Mean Reversion ──────────────────────────────────────────────────
  rsi_mean_reversion:
    enabled: true  # 2026-03-24 revalidated: BTC Sharpe 1.97, AVAX Sharpe 2.03, ETH Sharpe 1.16
    description: "Buy oversold, sell overbought using RSI."
    timeframe: "4h"
    symbols:
      # 2026-03-26 comprehensive Jan-Mar backtest — only pairs profitable in BOTH tests kept
      - "BTC/USD"    # +2.77% Sharpe 0.47, 47% WR — consistent across both tests
      - "SOL/USD"    # +10.27% Sharpe 1.37, 48% WR, PF 1.43 — NEW: best RSI discovery
      - "LTC/USD"    # +2.53% Sharpe 0.39, 44% WR — marginal but positive long-term
      # CUT 2026-03-26: DOGE (-5.73% long-term), AVAX (-1.03%), LINK (-4.19%), ETH (-2.83%), ADA (-2.55%)
    risk_per_trade: 1.0
    max_positions: 3
    parameters:
      rsi_period: 10              # Optimized from 14 — faster RSI catches reversals quicker (Sharpe +2.30)
      rsi_oversold: 35            # 2026-03-25: Relaxed from 30 — catches more dips in consolidation
      rsi_overbought: 65          # 2026-03-25: Relaxed from 70 — catches more rallies in consolidation
      rsi_exit: 50
      atr_stop_mult: 1.0         # Keep original — 0.8x dropped WR from 58% to 45%
      volume_mult: 1.0            # Relaxed from 1.2 — volume is lower in consolidation
      ema_trend_period: 200
      rr_min: 2.0

  # ── 2. EMA Crossover ──────────────────────────────────────────────────────
  ema_crossover:
    enabled: false  # Walk-forward: -0.03% OOS, coin-flip win rate. Full-year: -1.71%. Not viable.
    description: "MACD-style EMA crossover with signal-line confirmation."
    timeframe: "4h"
    symbols:
      # 9mo backtest: BTC +2.37% (no scale-out, 3.0/4.0). All others losing.
      - "BTC/USD"
    risk_per_trade: 1.5
    max_positions: 2
    parameters:
      fast_period: 12
      slow_period: 26
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      adx_threshold: 20.0
      atr_stop_mult: 3.0         # Wider stop: 2.5x was -4.93%, 3.0x is +2.37% (no scale-out)
      rr_ratio: 4.0              # 4.0 RR: sweet spot for trend-following (3.5 was -4.93%)

  # ── 3. Bollinger Band Squeeze Breakout ───────────────────────────────────
  bollinger_squeeze:
    enabled: true   # 2026-03-25: 500-bar 1h backtest — 7/9 pairs profitable, +13.61% aggregate, 97 trades
    description: "Squeeze breakout — 2-bar confirmation, ATR stops, volume exhaustion filter."
    timeframe: "1h"
    symbols:
      # 2026-03-25: Revalidated on 1h Kraken (500 bars). Sorted by return.
      - "ADA/USD"    # +6.33% WR 45%, PF 1.7x — BEST squeeze pair
      - "DOGE/USD"   # +3.46% WR 36%, PF 1.4x
      - "ATOM/USD"   # +3.00% WR 50%, PF 1.9x
      - "LINK/USD"   # +2.44% WR 44%, PF 1.4x
      - "LTC/USD"    # +2.19% WR 40%, PF 1.3x
      - "BTC/USD"    # +1.00% WR 43%, PF 1.1x — marginal, keep for liquidity
      - "XRP/USD"    # +0.54% WR 40%, PF 1.1x — marginal, keep for liquidity
      # Excluded: ETH (-3.58%), AVAX (-1.77%)
    risk_per_trade: 1.0
    max_positions: 3
    parameters:
      bb_period: 20
      bb_std: 2.0
      atr_stop_mult: 1.5         # 2026-03-25: tightened from 3.0 to match validated backtest
      atr_tp_mult: 3.0           # 2026-03-25: tightened from 6.0 to match 1:2 R:R that tested well
      squeeze_percentile: 15.0    # Relaxed from 10 — more squeeze opportunities
      exhaustion_vol_mult: 1.5    # Relaxed from 2.0 — lower volume in consolidation

  # ── 4. VWAP Bounce ────────────────────────────────────────────────────────
  vwap_bounce:
    enabled: false  # 9mo: BTC -34.91%, ETH -25.23%, SOL -1.75%. Needs fundamental rework.
    description: "Intraday reversion to VWAP with volume confirmation."
    timeframe: "15m"
    symbols:
      - "BTC/USD"
      - "ETH/USD"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      vwap_touch_pct: 0.001
      atr_stop_mult: 1.2
      atr_tp_mult: 1.5
      volume_mult: 1.2

  # ── 5. Multi-Timeframe Momentum ───────────────────────────────────────────
  # 2026-03-20: RESURRECTED with aggressive params (shorter EMAs for choppy regime)
  # Baseline (50/200 EMA): -1.10% avg, 3/7 GO
  # Aggressive (30/100 EMA): +0.44% avg, 3/7 GO — DOGE +5.98%, DOT +3.25%, XRP +2.75%
  multi_timeframe:
    enabled: true  # 2026-03-24 revalidated: DOGE Sharpe 2.0, XRP Sharpe 1.59
    description: "Align momentum across 3 timeframes before entering."
    timeframe: "4h"
    timeframes:
      primary: "4h"
      secondary: "1h"
      confirmation: "15m"
    symbols:
      # 2026-03-24 fresh 721-bar Kraken backtest — Sharpe > 0.65 only
      - "DOGE/USD"   # +9.45% Sharpe 2.00, 55% WR, PF 2.72 — BEST MULTI-TF PAIR
      - "XRP/USD"    # +7.70% Sharpe 1.59, 53% WR, PF 1.96 — STRONG
      - "LINK/USD"   # +2.97% Sharpe 0.70, 33% WR, PF 1.36 — MARGINAL, keep for diversity
      # Gold/Silver — validated on real OANDA data (prior sessions)
      - "XAU_USD"    # +10.94% Sharpe 2.10 — GOLD CHAMPION
      - "XAG_USD"    # +7.21% Sharpe 1.43 — SILVER STRONG
      # Removed: BTC (+0.95% marginal), ETH (-1.26%), SOL (-4.08%), all others negative
    risk_per_trade: 1.5
    max_positions: 3
    parameters:
      htf_fast_ema: 30           # Shorter (was 50) — captures medium-term moves in choppy regime
      htf_slow_ema: 100          # Shorter (was 200) — adapts faster to regime changes
      mtf_ema: 10                # Shorter (was 21) — more frequent pullback signals
      ltf_macd_fast: 12
      ltf_macd_slow: 26
      ltf_macd_signal: 9
      ltf_rsi_period: 14
      ltf_rsi_entry_long: 40.0
      ltf_rsi_entry_short: 60.0
      atr_period: 14
      atr_stop_mult: 2.0         # Tighter (was 3.0) — cut losers faster in choppy range
      rr_ratio: 2.5              # Lower (was 4.0) — take smaller wins in choppy markets
      min_confluence: 2
      htf_resample_rule: "4h"
      mtf_resample_rule: "1h"

  # ── 6. London Session Breakout ────────────────────────────────────────────
  london_breakout:
    enabled: false  # 2026-03-20: 0 trades on synthetic forex. Needs real OANDA data to validate session timing.
    description: "Trade the breakout of the London open range (08:00-10:00 UTC)."
    timeframe: "5m"
    symbols:
      # Forex pairs — London breakout is a forex-specific strategy
      # Requires OANDA_TOKEN in .env
      - "EUR_USD"
      - "GBP_USD"
      - "EUR_GBP"
    risk_per_trade: 1.5
    max_positions: 1
    parameters:
      asian_start_hour: 0
      asian_end_hour: 7
      breakout_start_hour: 7
      breakout_end_hour: 9
      breakout_vol_mult: 1.2
      min_range_atr_ratio: 0.3
      max_range_atr_ratio: 2.0
      tp_range_mult: 1.5
      atr_period: 14
      volume_period: 20
      avoid_nfp: true

  # ── 7. S&P 500 Opening Range Breakout ─────────────────────────────────────
  opening_range:
    enabled: false  # 2026-03-20: -5.45% avg, 1/5 profitable on synthetic stocks. Needs real Alpaca data to validate.
    description: "First 15-minute range breakout at NYSE open (09:30-09:45 ET)."
    timeframe: "5m"
    symbols:
      # US stocks — Opening Range is a US equity session strategy
      # Requires ALPACA_API_KEY in .env
      - "SPY"
      - "QQQ"
      - "AAPL"
      - "TSLA"
      - "NVDA"
    risk_per_trade: 1.0
    max_positions: 1
