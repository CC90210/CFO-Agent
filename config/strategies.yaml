      - "GBP_USD"
      - "USD_JPY"
      - "AUD_USD"
      - "USD_CAD"
      - "EUR_GBP"
      # ── Commodities (via OANDA) — requires OANDA_TOKEN in .env ──
      - "XAU_USD"    # Gold
      - "XAG_USD"    # Silver
    risk_per_trade: 1.5
    max_positions: 5
    parameters:
      htf_fast_ema: 50
      htf_slow_ema: 200
      mtf_ema: 21
      ltf_macd_fast: 12
      ltf_macd_slow: 26
      ltf_macd_signal: 9
      ltf_rsi_period: 14
      ltf_rsi_entry_long: 40.0
      ltf_rsi_entry_short: 60.0
      atr_period: 14
      atr_stop_mult: 3.0         # Wider: 2.0x was -16.67% BTC, 3.0x is +21.16% BNB
      rr_ratio: 4.0              # 4.0 RR: empirically best for trend-following
      min_confluence: 2
      htf_resample_rule: "4h"
      mtf_resample_rule: "1h"

