# ─────────────────────────────────────────────────────────────────────────────
#  ATLAS TRADING AGENT — Strategy Configuration
#  All strategies are loaded at runtime by core/engine.py.
#  Set enabled: false to exclude a strategy from the run.
# ─────────────────────────────────────────────────────────────────────────────

strategies:

  # ── 1. RSI Mean Reversion ──────────────────────────────────────────────────
  rsi_mean_reversion:
    enabled: true
    description: "Buy oversold, sell overbought using RSI."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
      - "XRP/USDT"
      - "ADA/USDT"
      - "AVAX/USDT"
      - "LINK/USDT"
      - "DOT/USDT"
      - "DOGE/USDT"
    risk_per_trade: 1.0        # % of equity risked per trade
    max_positions: 2
    parameters:
      period: 14
      oversold: 25              # Deeper oversold catches stronger reversals
      overbought: 75            # Higher overbought threshold for stronger signals
      # Exit when RSI crosses back through these mid-levels
      exit_oversold: 50
      exit_overbought: 50
      atr_stop_mult: 2.5        # Wider stops to survive noise (was 1.5)

  # ── 2. EMA Crossover ──────────────────────────────────────────────────────
  ema_crossover:
    enabled: true
    description: "MACD-style EMA crossover with signal-line confirmation."
    timeframe: "4h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
      - "XRP/USDT"
      - "AVAX/USDT"
      - "LINK/USDT"
    risk_per_trade: 1.5
    max_positions: 2
    parameters:
      fast: 12
      slow: 26
      signal: 9
      # Require price to be above/below this EMA for trend-filter
      trend_filter_ema: 200
      adx_threshold: 20          # Lower ADX catches early-trend breakouts (was 25)
      atr_stop_mult: 3.0         # Wider stops for trend trades (was 2.0)

  # ── 3. Bollinger Band Mean Reversion ──────────────────────────────────────
  bollinger_squeeze:
    enabled: true
    description: "Enter when price touches a band; exit at the midline."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "BNB/USDT"
    risk_per_trade: 1.0
    max_positions: 3
    parameters:
      period: 20
      std_dev: 2.0
      # Require this minimum squeeze ratio before taking a trade
      min_squeeze_ratio: 0.02

  # ── 4. VWAP Bounce ────────────────────────────────────────────────────────
  vwap_bounce:
    enabled: true
    description: "Intraday reversion to VWAP with volume confirmation."
    timeframe: "15m"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      vwap_deviation_pct: 1.5   # Enter when price deviates this % from VWAP
      volume_multiplier: 1.5    # Require volume to be this × the rolling mean
      session_start_utc: "00:00"
      session_end_utc: "23:59"

  # ── 5. Multi-Timeframe Momentum ───────────────────────────────────────────
  multi_timeframe:
    enabled: true
    description: "Align momentum across 3 timeframes before entering."
    timeframe: "4h"
    timeframes:
      primary: "4h"
      secondary: "1h"
      confirmation: "15m"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
      - "AVAX/USDT"
      - "LINK/USDT"
    risk_per_trade: 1.5
    max_positions: 2
    parameters:
      momentum_period: 14
      min_alignment: 3          # All 3 timeframes must agree
      atr_multiplier: 2.5       # Stop-loss distance in ATR units (was 2.0)
      take_profit_ratio: 3.0    # Risk-reward ratio for take-profit (was 2.5)

  # ── 6. London Session Breakout ────────────────────────────────────────────
  london_breakout:
    enabled: true
    description: "Trade the breakout of the London open range (08:00-10:00 UTC)."
    timeframe: "5m"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.5
    max_positions: 1
    parameters:
      range_start_utc: "08:00"
      range_end_utc:   "10:00"
      trade_window_end_utc: "16:00"  # No new entries after this time
      breakout_buffer_pct: 0.1        # % above/below range high/low to confirm breakout
      atr_stop_multiplier: 1.5
      min_range_size_pct: 0.3         # Skip if range is too tight

  # ── 7. S&P 500 Opening Range Breakout ─────────────────────────────────────
  opening_range:
    enabled: true
    description: "First 15-minute range breakout at NYSE open (09:30-09:45 ET)."
    timeframe: "5m"
    symbols:
      # Crypto proxies that correlate with US equity open
      - "BTC/USDT"
    risk_per_trade: 1.0
    max_positions: 1
    parameters:
      range_start_et: "09:30"
      range_end_et:   "09:45"
      trade_window_end_et: "11:00"   # Only trade the morning session
      breakout_buffer_pct: 0.05
      atr_stop_multiplier: 1.0
      min_range_size_pct: 0.2
      # Require SPY correlation to be above this threshold
      # (calculated from last 20 bars of daily closes)
      min_spy_correlation: 0.6

  # ── 8. Smart Money Concepts ──────────────────────────────────────────────
  smart_money:
    enabled: true
    description: "Order blocks, fair value gaps, and liquidity sweeps."
    timeframe: "4h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      ob_tolerance_pct: 0.8
      fvg_min_atr_ratio: 0.3
      atr_stop_mult: 2.0

  # ── 9. Ichimoku Cloud Trend ─────────────────────────────────────────────
  ichimoku_trend:
    enabled: true
    description: "Full Ichimoku 5-condition entry with cloud exit."
    timeframe: "4h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
      - "AVAX/USDT"
    risk_per_trade: 1.5
    max_positions: 2
    parameters:
      tenkan_period: 9
      kijun_period: 26
      senkou_b_period: 52
      displacement: 26

  # ── 10. Order Flow Imbalance ────────────────────────────────────────────
  order_flow_imbalance:
    enabled: true
    description: "CVD divergence + absorption candles for institutional flow detection."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      cvd_window: 20
      adx_max: 30.0
      atr_stop_mult: 2.0
      rr_ratio: 3.0
      volume_mult: 1.5

  # ── 11. Z-Score Mean Reversion ──────────────────────────────────────────
  zscore_mean_reversion:
    enabled: true
    description: "Statistical Z-score reversion with multi-timeframe confirmation."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
      - "XRP/USDT"
      - "ADA/USDT"
      - "AVAX/USDT"
      - "LINK/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      zscore_period: 50
      zscore_entry: 2.0
      zscore_htf_entry: 1.5
      rsi_oversold: 30.0
      rsi_overbought: 70.0
      adx_max: 25.0
      atr_stop_mult: 2.5
      volume_mult: 1.5

  # ── 12. Volume Profile / Value Area ─────────────────────────────────────
  volume_profile:
    enabled: true
    description: "Institutional volume profile — fade outside Value Area, breakout with POC trend."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      profile_window: 100
      profile_bins: 50
      rsi_oversold: 35.0
      rsi_overbought: 65.0
      atr_stop_mult: 1.5
      volume_mult: 1.5
      breakout_vol_mult: 2.0
