# ─────────────────────────────────────────────────────────────────────────────
#  ATLAS TRADING AGENT — Strategy Configuration
#  All strategies are loaded at runtime by core/engine.py.
#  Set enabled: false to exclude a strategy from the run.
#
#  TUNING NOTE (2026-03-19): Scale-out tiers DISABLED in backtest engine.
#  Empirical finding: default scale-out (30% at 1R, 30% at 2R) causes -5% to
#  -20% return drag vs no scale-out. Multi-TF went from -16.67% to +21.16%
#  on BNB by removing scale-out alone.
# ─────────────────────────────────────────────────────────────────────────────

strategies:

  # ── 1. RSI Mean Reversion ──────────────────────────────────────────────────
  rsi_mean_reversion:
    enabled: false  # 2026-03-19: -3.01% on BTC 1h (0% WR, 2 trades). Filters too tight, not viable.
    description: "Buy oversold, sell overbought using RSI."
    timeframe: "1h"
    symbols:
      # 9mo backtest: Only BTC profitable (+2.54% no scale-out). ETH/SOL losing.
      - "BTC/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      rsi_period: 14
      rsi_oversold: 30            # Relaxed from 28 — was generating only 1 trade per 2000 bars
      rsi_overbought: 70          # Relaxed from 72 — industry standard thresholds
      rsi_exit: 50
      atr_stop_mult: 1.0         # Keep original — 0.8x dropped WR from 58% to 45%
      volume_mult: 1.2
      ema_trend_period: 200
      rr_min: 2.0

  # ── 2. EMA Crossover ──────────────────────────────────────────────────────
  ema_crossover:
    enabled: false  # Walk-forward: -0.03% OOS, coin-flip win rate. Full-year: -1.71%. Not viable.
    description: "MACD-style EMA crossover with signal-line confirmation."
    timeframe: "4h"
    symbols:
      # 9mo backtest: BTC +2.37% (no scale-out, 3.0/4.0). All others losing.
      - "BTC/USDT"
    risk_per_trade: 1.5
    max_positions: 2
    parameters:
      fast_period: 12
      slow_period: 26
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      adx_threshold: 20.0
      atr_stop_mult: 3.0         # Wider stop: 2.5x was -4.93%, 3.0x is +2.37% (no scale-out)
      rr_ratio: 4.0              # 4.0 RR: sweet spot for trend-following (3.5 was -4.93%)

  # ── 3. Bollinger Band Squeeze Breakout ───────────────────────────────────
  bollinger_squeeze:
    enabled: false  # Walk-forward: -0.33% OOS, 14.7% win rate. Squeeze too rare on 1h SOL.
    description: "Squeeze breakout — 2-bar confirmation, ATR stops, volume exhaustion filter."
    timeframe: "1h"
    symbols:
      # 9mo backtest (no scale-out): SOL +1.74% (best), BTC -1.58%, AVAX -3.1%
      - "SOL/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      bb_period: 20
      bb_std: 2.0
      atr_stop_mult: 3.0         # 3.0x + 6.0 TP = +1.74% SOL (2.0x was only +0.11%)
      atr_tp_mult: 6.0           # Wider TP lets squeeze resolution play out
      squeeze_percentile: 10.0
      exhaustion_vol_mult: 2.0

  # ── 4. VWAP Bounce ────────────────────────────────────────────────────────
  vwap_bounce:
    enabled: false  # 9mo: BTC -34.91%, ETH -25.23%, SOL -1.75%. Needs fundamental rework.
    description: "Intraday reversion to VWAP with volume confirmation."
    timeframe: "15m"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      vwap_touch_pct: 0.001
      atr_stop_mult: 1.2
      atr_tp_mult: 1.5
      volume_mult: 1.2

  # ── 5. Multi-Timeframe Momentum ───────────────────────────────────────────
  # STAR STRATEGY: Best performer across multiple symbols
  multi_timeframe:
    enabled: true
    description: "Align momentum across 3 timeframes before entering."
    timeframe: "4h"
    timeframes:
      primary: "4h"
      secondary: "1h"
      confirmation: "15m"
    symbols:
      # ── Crypto (via Binance/CCXT) ──
      # 2026-03-19 backtest results (2000 bars 4h):
      # BTC +8.41% WR:72.2% Sharpe:3.57 — TOP PERFORMER
      # ETH +2.93% WR:66.7% Sharpe:1.31
      # ADA +3.82% WR:54.5% Sharpe:1.29
      # MATIC +3.53% WR:61.5% Sharpe:0.98
      # DOGE +2.95% WR:66.7% Sharpe:1.14
      # XRP +1.27% WR:60.0% Sharpe:0.44
      - "BTC/USDT"
      - "ETH/USDT"
      - "ADA/USDT"
      - "MATIC/USDT"
      - "DOGE/USDT"
      - "XRP/USDT"
      - "SOL/USDT"
      - "AVAX/USDT"
      - "LINK/USDT"
      # ── US Stocks (via Alpaca) — requires ALPACA_API_KEY in .env ──
      - "AAPL"
      - "TSLA"
      - "NVDA"
      - "MSFT"
      - "AMZN"
      - "META"
      - "GOOG"
      - "SPY"       # S&P 500 ETF
      - "QQQ"       # Nasdaq 100 ETF
      - "AMD"
      # ── Forex (via OANDA) — requires OANDA_TOKEN in .env ──
      - "EUR_USD"
      - "GBP_USD"
      - "USD_JPY"
      - "AUD_USD"
      - "USD_CAD"
      - "EUR_GBP"
      # ── Commodities (via OANDA) — requires OANDA_TOKEN in .env ──
      - "XAU_USD"    # Gold
      - "XAG_USD"    # Silver
    risk_per_trade: 1.5
    max_positions: 5
    parameters:
      htf_fast_ema: 50
      htf_slow_ema: 200
      mtf_ema: 21
      ltf_macd_fast: 12
      ltf_macd_slow: 26
      ltf_macd_signal: 9
      ltf_rsi_period: 14
      ltf_rsi_entry_long: 40.0
      ltf_rsi_entry_short: 60.0
      atr_period: 14
      atr_stop_mult: 3.0         # Wider: 2.0x was -16.67% BTC, 3.0x is +21.16% BNB
      rr_ratio: 4.0              # 4.0 RR: empirically best for trend-following
      min_confluence: 2
      htf_resample_rule: "4h"
      mtf_resample_rule: "1h"

  # ── 6. London Session Breakout ────────────────────────────────────────────
  london_breakout:
    enabled: true   # Re-enabled on FOREX pairs (was broken on crypto — time-window is forex-native)
    description: "Trade the breakout of the London open range (08:00-10:00 UTC)."
    timeframe: "5m"
    symbols:
      # Forex pairs — London breakout is a forex-specific strategy
      # Requires OANDA_TOKEN in .env
      - "EUR_USD"
      - "GBP_USD"
      - "EUR_GBP"
    risk_per_trade: 1.5
    max_positions: 1
    parameters:
      asian_start_hour: 0
      asian_end_hour: 7
      breakout_start_hour: 7
      breakout_end_hour: 9
      breakout_vol_mult: 1.2
      min_range_atr_ratio: 0.3
      max_range_atr_ratio: 2.0
      tp_range_mult: 1.5
      atr_period: 14
      volume_period: 20
      avoid_nfp: true

  # ── 7. S&P 500 Opening Range Breakout ─────────────────────────────────────
  opening_range:
    enabled: true   # Re-enabled on US STOCKS (was losing on crypto — this is an equities strategy)
    description: "First 15-minute range breakout at NYSE open (09:30-09:45 ET)."
    timeframe: "5m"
    symbols:
      # US stocks — Opening Range is a US equity session strategy
      # Requires ALPACA_API_KEY in .env
      - "SPY"
      - "QQQ"
      - "AAPL"
      - "TSLA"
      - "NVDA"
    risk_per_trade: 1.0
    max_positions: 1
    parameters:
      or_start_hour_utc: 13
      or_start_minute_utc: 30
      or_end_hour_utc: 13
      or_end_minute_utc: 45
      time_stop_hour_utc: 20
      time_stop_minute_utc: 30
      breakout_vol_mult: 1.5
      gap_filter_pct: 0.015
      min_range_atr_ratio: 0.75
      max_range_atr_ratio: 1.5
      tp_range_mult: 1.5
      rr_ratio: 3.0
      atr_period: 14
      volume_period: 20

  # ── 8. Smart Money Concepts ──────────────────────────────────────────────
  smart_money:
    enabled: true   # 9mo (no scale-out): ETH +2.66% PF 2.65. Low trade count but high quality.
    description: "Order blocks, fair value gaps, and liquidity sweeps."
    timeframe: "4h"
    symbols:
      # Crypto
      - "ETH/USDT"      # +2.66% backtested (BTC -1.66%, SOL -1.31%)
      # US Stocks — Smart Money (order blocks, FVGs) works on all liquid markets
      # Requires ALPACA_API_KEY in .env
      - "SPY"
      - "AAPL"
      - "NVDA"
      # Forex — Requires OANDA_TOKEN in .env
      - "EUR_USD"
      - "GBP_USD"
      # Gold — Requires OANDA_TOKEN in .env
      - "XAU_USD"
    risk_per_trade: 1.0
    max_positions: 3
    parameters:
      swing_lookback: 5
      ob_lookback: 50
      fvg_min_size_atr_ratio: 0.15
      bos_lookback: 100
      ob_entry_tolerance: 0.015
      atr_period: 14
      atr_stop_mult: 2.0
      rr_ratio: 3.0
      volume_period: 20
      min_rr_for_swing_tp: 2.0
      displacement_atr_mult: 1.5
      displacement_vol_mult: 1.2
      time_stop_bars: 50

  # ── 9. Ichimoku Cloud Trend ─────────────────────────────────────────────
  ichimoku_trend:
    enabled: false  # 9mo (no scale-out): ETH -2.93%, BTC -3.74%. Exits via signal before TP — RR irrelevant.
    description: "Full Ichimoku 5-condition entry with cloud exit."
    timeframe: "4h"
    symbols:
      - "ETH/USDT"
      - "BTC/USDT"
    risk_per_trade: 1.5
    max_positions: 2
    parameters:
      tenkan_period: 9
      kijun_period: 26
      senkou_b_period: 52
      displacement: 26
      atr_period: 14
      rr_ratio: 3.0

  # ── 10. Order Flow Imbalance ────────────────────────────────────────────
  order_flow_imbalance:
    enabled: false  # 9mo: BTC -31.06%, ETH -18.02%, SOL -15.99%. CVD proxy unreliable on spot.
    description: "CVD divergence + absorption candles for institutional flow detection."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      cvd_window: 20
      adx_period: 14
      adx_max: 30.0
      atr_period: 14
      atr_stop_mult: 2.0
      rr_ratio: 3.0
      volume_period: 20
      volume_mult: 1.5
      exhaustion_mult: 3.0
      sma_period: 20

  # ── 11. Z-Score Mean Reversion ──────────────────────────────────────────
  zscore_mean_reversion:
    enabled: false  # 2026-03-19: -3.40% on ETH 1h even with relaxed params (25% WR, 4 trades). Too many gates.
    description: "Statistical Z-score reversion with multi-timeframe confirmation."
    timeframe: "1h"
    symbols:
      # Full-year robust: ETH +6.36% (PF 2.06). SOL failed full year (-5.23%).
      - "ETH/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      zscore_period: 50
      zscore_entry: 1.5            # Relaxed from 1.8 — was generating 0 trades with 5 cascading gates
      zscore_htf_entry: 1.0        # Relaxed from 1.5 — HTF gate was too restrictive on 1h
      htf_resample_factor: 4
      rsi_period: 14
      rsi_oversold: 30.0
      rsi_overbought: 70.0
      rsi_exit: 50.0
      adx_period: 14
      adx_max: 35.0               # Relaxed from 30 — allows slightly trending markets
      atr_period: 14
      atr_stop_mult: 2.5
      atr_trail_mult: 1.5
      volume_period: 20
      volume_mult: 1.2             # Relaxed from 1.5 — lower volume gate

  # ── 12. Volume Profile / Value Area ─────────────────────────────────────
  volume_profile:
    enabled: false  # 9mo: BTC -6.74%, ETH -1.85%, SOL -5.50%. Needs longer timeframe.
    description: "Institutional volume profile — fade outside Value Area, breakout with POC trend."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      profile_window: 100
      profile_bins: 50
      rsi_period: 14
      rsi_oversold: 30.0
      rsi_overbought: 70.0
      rsi_exit: 50.0
      atr_period: 14
      atr_stop_mult: 1.5
      volume_period: 20
      volume_mult: 2.0
      breakout_vol_mult: 2.5
      min_volume_mult: 1.2
      hvn_threshold: 1.5
      lvn_threshold: 0.5
      poc_trend_bars: 10
      bounce_lookback: 30
      bounce_tolerance: 0.003
      adx_period: 14
      adx_min_trend: 20.0
      min_distance_atr: 1.0
      min_rr: 2.0
