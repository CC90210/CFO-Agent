      - "XRP/USD"    # +7.70% Sharpe 2.48, 100% WR — BEST divergence pair
      - "ATOM/USD"   # +13.55% Sharpe 1.44, 67% WR, PF 2.63
      - "ADA/USD"    # +7.89% Sharpe 2.65, 100% WR
      - "DOGE/USD"   # +3.70% Sharpe 1.74, 100% WR
    risk_per_trade: 1.0
    max_positions: 3
    parameters:
