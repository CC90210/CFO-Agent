# ─────────────────────────────────────────────────────────────────────────────
#  ATLAS TRADING AGENT — Strategy Configuration
#  All strategies are loaded at runtime by core/engine.py.
#  Set enabled: false to exclude a strategy from the run.
#
#  TUNING NOTE (2026-03-19): Scale-out tiers DISABLED in backtest engine.
#  Empirical finding: default scale-out (30% at 1R, 30% at 2R) causes -5% to
#  -20% return drag vs no scale-out. Multi-TF went from -16.67% to +21.16%
#  on BNB by removing scale-out alone.
# ─────────────────────────────────────────────────────────────────────────────

strategies:

  # ── 1. RSI Mean Reversion ──────────────────────────────────────────────────
  rsi_mean_reversion:
    enabled: false  # 2026-03-19: -3.01% on BTC 1h (0% WR, 2 trades). Filters too tight, not viable.
    description: "Buy oversold, sell overbought using RSI."
    timeframe: "1h"
    symbols:
      # 9mo backtest: Only BTC profitable (+2.54% no scale-out). ETH/SOL losing.
      - "BTC/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      rsi_period: 14
      rsi_oversold: 30            # Relaxed from 28 — was generating only 1 trade per 2000 bars
      rsi_overbought: 70          # Relaxed from 72 — industry standard thresholds
      rsi_exit: 50
      atr_stop_mult: 1.0         # Keep original — 0.8x dropped WR from 58% to 45%
      volume_mult: 1.2
      ema_trend_period: 200
      rr_min: 2.0

  # ── 2. EMA Crossover ──────────────────────────────────────────────────────
  ema_crossover:
    enabled: false  # Walk-forward: -0.03% OOS, coin-flip win rate. Full-year: -1.71%. Not viable.
    description: "MACD-style EMA crossover with signal-line confirmation."
    timeframe: "4h"
    symbols:
      # 9mo backtest: BTC +2.37% (no scale-out, 3.0/4.0). All others losing.
      - "BTC/USDT"
    risk_per_trade: 1.5
    max_positions: 2
    parameters:
      fast_period: 12
      slow_period: 26
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      adx_threshold: 20.0
      atr_stop_mult: 3.0         # Wider stop: 2.5x was -4.93%, 3.0x is +2.37% (no scale-out)
      rr_ratio: 4.0              # 4.0 RR: sweet spot for trend-following (3.5 was -4.93%)

  # ── 3. Bollinger Band Squeeze Breakout ───────────────────────────────────
  bollinger_squeeze:
    enabled: false  # Walk-forward: -0.33% OOS, 14.7% win rate. Squeeze too rare on 1h SOL.
    description: "Squeeze breakout — 2-bar confirmation, ATR stops, volume exhaustion filter."
    timeframe: "1h"
    symbols:
      # 9mo backtest (no scale-out): SOL +1.74% (best), BTC -1.58%, AVAX -3.1%
      - "SOL/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      bb_period: 20
      bb_std: 2.0
      atr_stop_mult: 3.0         # 3.0x + 6.0 TP = +1.74% SOL (2.0x was only +0.11%)
      atr_tp_mult: 6.0           # Wider TP lets squeeze resolution play out
      squeeze_percentile: 10.0
      exhaustion_vol_mult: 2.0

  # ── 4. VWAP Bounce ────────────────────────────────────────────────────────
  vwap_bounce:
    enabled: false  # 9mo: BTC -34.91%, ETH -25.23%, SOL -1.75%. Needs fundamental rework.
    description: "Intraday reversion to VWAP with volume confirmation."
    timeframe: "15m"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      vwap_touch_pct: 0.001
      atr_stop_mult: 1.2
      atr_tp_mult: 1.5
      volume_mult: 1.2

  # ── 5. Multi-Timeframe Momentum ───────────────────────────────────────────
  # 2026-03-20: -2.43% avg across 7 crypto symbols on Kraken. Only 1/7 profitable. DISABLED.
  multi_timeframe:
    enabled: false  # 2026-03-20 Kraken backtest: -2.43% avg, 14% profitable. Trend-follower dying in chop.
    description: "Align momentum across 3 timeframes before entering."
    timeframe: "4h"
    timeframes:
      primary: "4h"
      secondary: "1h"
      confirmation: "15m"
    symbols:
      # ── Crypto (via Binance/CCXT) ──
      # 2026-03-19 backtest results (2000 bars 4h):
      # BTC +8.41% WR:72.2% Sharpe:3.57 — TOP PERFORMER
      # ETH +2.93% WR:66.7% Sharpe:1.31
      # ADA +3.82% WR:54.5% Sharpe:1.29
      # DOT +TBD (replaced MATIC — not on Kraken)
      # DOGE +2.95% WR:66.7% Sharpe:1.14
