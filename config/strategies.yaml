# ─────────────────────────────────────────────────────────────────────────────
#  ATLAS TRADING AGENT — Strategy Configuration
#  All strategies are loaded at runtime by core/engine.py.
#  Set enabled: false to exclude a strategy from the run.
# ─────────────────────────────────────────────────────────────────────────────

strategies:

  # ── 1. RSI Mean Reversion ──────────────────────────────────────────────────
  rsi_mean_reversion:
    enabled: true
    description: "Buy oversold, sell overbought using RSI."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
      - "XRP/USDT"
      - "ADA/USDT"
      - "AVAX/USDT"
      - "LINK/USDT"
      - "DOT/USDT"
      - "DOGE/USDT"
    risk_per_trade: 1.0        # % of equity risked per trade
    max_positions: 2
    parameters:
      rsi_period: 14
      rsi_oversold: 28           # Tuned on 2026 data (was 30, then 25)
      rsi_overbought: 72         # Tuned on 2026 data (was 70, then 75)
      rsi_exit: 50
      atr_stop_mult: 1.0         # Tight stop for mean reversion (tuned from 2.5)
      volume_mult: 1.2           # Volume confirmation (tuned from 1.5)
      ema_trend_period: 200      # Only long above 200 EMA, short below
      rr_min: 2.0                # Enforce 2:1 R:R minimum

  # ── 2. EMA Crossover ──────────────────────────────────────────────────────
  ema_crossover:
    enabled: true
    description: "MACD-style EMA crossover with signal-line confirmation."
    timeframe: "4h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
      - "XRP/USDT"
      - "AVAX/USDT"
      - "LINK/USDT"
    risk_per_trade: 1.5
    max_positions: 2
    parameters:
      fast_period: 12
      slow_period: 26
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      adx_threshold: 20.0        # Lower ADX catches early-trend breakouts (was 25)
      atr_stop_mult: 3.0         # Wider stops for trend trades (was 2.0)
      rr_ratio: 3.0              # Risk-reward ratio

  # ── 3. Bollinger Band Mean Reversion ──────────────────────────────────────
  bollinger_squeeze:
    enabled: true
    description: "Squeeze breakout — 2-bar confirmation, ATR stops, volume exhaustion filter."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "BNB/USDT"
    risk_per_trade: 1.0
    max_positions: 3
    parameters:
      bb_period: 20
      bb_std: 2.0
      atr_stop_mult: 2.0           # Wider stop lets squeeze resolve (tuned from 1.5)
      atr_tp_mult: 5.0             # Big TP lets winners run (tuned from 2.5)
      squeeze_percentile: 10.0
      exhaustion_vol_mult: 2.0

  # ── 4. VWAP Bounce ────────────────────────────────────────────────────────
  vwap_bounce:
    enabled: true
    description: "Intraday reversion to VWAP with volume confirmation."
    timeframe: "15m"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      vwap_touch_pct: 0.001     # Price within 0.1% of VWAP triggers entry
      atr_stop_mult: 1.2        # Stop distance in ATR units
      atr_tp_mult: 1.5          # Take-profit distance in ATR units
      volume_mult: 1.2           # Volume confirmation multiplier

  # ── 5. Multi-Timeframe Momentum ───────────────────────────────────────────
  multi_timeframe:
    enabled: true
    description: "Align momentum across 3 timeframes before entering."
    timeframe: "4h"
    timeframes:
      primary: "4h"
      secondary: "1h"
      confirmation: "15m"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
      - "AVAX/USDT"
      - "LINK/USDT"
    risk_per_trade: 1.5
    max_positions: 2
    parameters:
      htf_fast_ema: 50
      htf_slow_ema: 200
      mtf_ema: 21
      ltf_macd_fast: 12
      ltf_macd_slow: 26
      ltf_macd_signal: 9
      ltf_rsi_period: 14
      ltf_rsi_entry_long: 40.0   # RSI level to cross above for long LTF trigger
      ltf_rsi_entry_short: 60.0  # RSI level to cross below for short LTF trigger
      atr_period: 14
      atr_stop_mult: 2.5         # Stop-loss distance in ATR units (was 2.0)
      rr_ratio: 3.0              # Risk-reward ratio for take-profit (was 2.5)
      min_confluence: 2          # Minimum confluence score to enter
      htf_resample_rule: "4h"   # Pandas resample rule for high timeframe
      mtf_resample_rule: "1h"   # Pandas resample rule for medium timeframe

  # ── 6. London Session Breakout ────────────────────────────────────────────
  london_breakout:
    enabled: true
    description: "Trade the breakout of the London open range (08:00-10:00 UTC)."
    timeframe: "5m"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.5
    max_positions: 1
    parameters:
      asian_start_hour: 0             # Asian session start (UTC)
      asian_end_hour: 7               # Asian session end (UTC)
      breakout_start_hour: 7          # London breakout window start (UTC)
      breakout_end_hour: 9            # London breakout window end (UTC)
      breakout_vol_mult: 1.2          # Volume multiplier for breakout confirmation
      min_range_atr_ratio: 0.3        # Skip if range too tight relative to ATR
      max_range_atr_ratio: 2.0        # Skip if range too wide
      tp_range_mult: 1.5              # Take-profit as multiple of range size
      atr_period: 14
      volume_period: 20
      avoid_nfp: true                 # Skip first Friday of each month (NFP)

  # ── 7. S&P 500 Opening Range Breakout ─────────────────────────────────────
  opening_range:
    enabled: true
    description: "First 15-minute range breakout at NYSE open (09:30-09:45 ET)."
    timeframe: "5m"
    symbols:
      # Crypto proxies that correlate with US equity open
      - "BTC/USDT"
    risk_per_trade: 1.0
    max_positions: 1
    parameters:
      or_start_hour_utc: 13           # 09:30 ET = 13:30 UTC
      or_start_minute_utc: 30
      or_end_hour_utc: 13             # 09:45 ET = 13:45 UTC
      or_end_minute_utc: 45
      time_stop_hour_utc: 20          # 16:00 ET = 20:00 UTC (end of US session)
      time_stop_minute_utc: 30
      breakout_vol_mult: 1.5          # Volume multiplier for breakout confirmation
      gap_filter_pct: 0.015           # Skip session if prior-close-to-open gap > 1.5%
      min_range_atr_ratio: 0.75       # Minimum range size relative to ATR
      max_range_atr_ratio: 1.5        # Maximum range size relative to ATR
      tp_range_mult: 1.5              # Take-profit as multiple of range size
      rr_ratio: 3.0                   # Risk-reward ratio
      atr_period: 14
      volume_period: 20

  # ── 8. Smart Money Concepts ──────────────────────────────────────────────
  smart_money:
    enabled: false  # Disabled: 0% win rate on 2026 BTC. OB detection needs fundamental rework.
    description: "Order blocks, fair value gaps, and liquidity sweeps."
    timeframe: "4h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      swing_lookback: 5               # Bars each side for swing high/low detection
      ob_lookback: 50                 # Bars to search for order blocks
      fvg_min_size_atr_ratio: 0.15   # Minimum FVG size as a ratio of ATR
      bos_lookback: 100               # Bars to look back for BOS/CHoCH events
      ob_entry_tolerance: 0.015       # Tolerance for price entering OB zone (1.5%)
      atr_period: 14
      atr_stop_mult: 2.0
      rr_ratio: 3.0
      volume_period: 20
      min_rr_for_swing_tp: 2.0       # Swing TP only used if it delivers at least this R:R
      displacement_atr_mult: 1.5     # OB displacement must cover this × ATR total range
      displacement_vol_mult: 1.2     # Displacement candles avg vol > this × rolling avg vol
      time_stop_bars: 50             # Exit if TP not reached within this many bars

  # ── 9. Ichimoku Cloud Trend ─────────────────────────────────────────────
  ichimoku_trend:
    enabled: true
    description: "Full Ichimoku 5-condition entry with cloud exit."
    timeframe: "4h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
      - "AVAX/USDT"
    risk_per_trade: 1.5
    max_positions: 2
    parameters:
      tenkan_period: 9
      kijun_period: 26
      senkou_b_period: 52
      displacement: 26
      atr_period: 14
      rr_ratio: 2.0               # Fallback R:R when Kijun stop distance is zero

  # ── 10. Order Flow Imbalance ────────────────────────────────────────────
  order_flow_imbalance:
    enabled: true
    description: "CVD divergence + absorption candles for institutional flow detection."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      cvd_window: 20
      adx_period: 14
      adx_max: 30.0
      atr_period: 14
      atr_stop_mult: 2.0
      rr_ratio: 3.0
      volume_period: 20
      volume_mult: 1.5
      exhaustion_mult: 3.0        # Volume spike multiple that signals exhaustion
      sma_period: 20              # SMA period used for exit trigger

  # ── 11. Z-Score Mean Reversion ──────────────────────────────────────────
  zscore_mean_reversion:
    enabled: true
    description: "Statistical Z-score reversion with multi-timeframe confirmation."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "BNB/USDT"
      - "XRP/USDT"
      - "ADA/USDT"
      - "AVAX/USDT"
      - "LINK/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      zscore_period: 50
      zscore_entry: 2.0
      zscore_htf_entry: 1.5
      htf_resample_factor: 4          # 4× bars → ~4h on 1h chart
      rsi_period: 14
      rsi_oversold: 30.0
      rsi_overbought: 70.0
      rsi_exit: 50.0                  # RSI level that signals mean-reversion complete
      adx_period: 14
      adx_max: 25.0
      atr_period: 14
      atr_stop_mult: 2.5
      atr_trail_mult: 1.5             # Tighter trailing stop once in profit
      volume_period: 20
      volume_mult: 1.5

  # ── 12. Volume Profile / Value Area ─────────────────────────────────────
  volume_profile:
    enabled: false  # Disabled: -2.89% on 2026 BTC. Needs longer timeframe (4h) and multi-symbol validation before re-enabling.
    description: "Institutional volume profile — fade outside Value Area, breakout with POC trend."
    timeframe: "1h"
    symbols:
      - "BTC/USDT"
      - "ETH/USDT"
    risk_per_trade: 1.0
    max_positions: 2
    parameters:
      profile_window: 100
      profile_bins: 50
      rsi_period: 14
      rsi_oversold: 30.0              # Tightened from 35 — only true extremes
      rsi_overbought: 70.0            # Tightened from 65
      rsi_exit: 50.0
      atr_period: 14
      atr_stop_mult: 1.5
      volume_period: 20
      volume_mult: 2.0                # Raised from 1.5 — stronger confirmation required
      breakout_vol_mult: 2.5          # Raised from 2.0 — breakouts need heavy volume
      min_volume_mult: 1.2            # Bar must have >= 120% of avg volume
      hvn_threshold: 1.5              # Bins with volume > 1.5× mean are HVNs
      lvn_threshold: 0.5              # Bins with volume < 0.5× mean are LVNs
      poc_trend_bars: 10
      bounce_lookback: 30
      bounce_tolerance: 0.003         # 0.3% of price counts as touching a level
      adx_period: 14
      adx_min_trend: 20.0             # ADX must be >= this to trade
      min_distance_atr: 1.0           # Price must be >= 1 ATR outside VA boundary
      min_rr: 2.0                     # Minimum acceptable risk:reward ratio
