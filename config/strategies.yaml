      divergence_lookback: 10
      divergence_min_bars: 3
      pctb_long: 0.20
      pctb_short: 0.80
      bb_period: 20
      bb_std: 2.0
      adx_period: 14
      adx_max: 25.0
      atr_period: 14
      atr_stop_mult: 1.0
      rr_min: 2.0
      volume_period: 20
